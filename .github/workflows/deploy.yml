name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: npm
      - run: npm ci
      - run: npm run typecheck:all
      - run: npm run lint
      - run: npm run deadcode
      - run: npm run format:check
      - run: npm run test:coverage
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
        if: always()
      - run: npm run build
      - name: Report bundle size
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find dist/assets -type f \( -name '*.js' -o -name '*.css' \) -exec ls -lh {} \; | awk '{print $5, $9}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total dist size:** $(du -sh dist | cut -f1)" >> $GITHUB_STEP_SUMMARY
      - name: Check JS chunk sizes
        run: |
          OVERSIZED=0
          while IFS= read -r file; do
            SIZE=$(stat --format=%s "$file")
            NAME=$(basename "$file")
            KB=$((SIZE / 1024))
            if [ "$KB" -gt 400 ]; then
              echo "::warning file=$file::JS chunk $NAME is ${KB}KB (exceeds 400KB limit)"
              OVERSIZED=1
            fi
          done < <(find dist/assets -name '*.js' -type f)
          if [ "$OVERSIZED" -eq 1 ]; then
            echo "::warning::One or more JS chunks exceed the 400KB size limit"
          else
            echo "All JS chunks are within the 400KB limit"
          fi
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
